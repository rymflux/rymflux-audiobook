# CI for rymflux-audiobook
#
# Runs on push/PR to main. Three parallel jobs:
#   check — svelte-check (type safety gate)
#   lint  — prettier + eslint (style + code quality gate)
#   test  — vitest run (unit test gate)
#
# rymflux-audiobook depends on rymflux-shell via file:../rymflux-shell,
# so the shell repo is checked out as a sibling directory.
# Both repos share the workspace parent as the common root, with the shell
# checked out into a rymflux-shell subdirectory inside the audiobook clone.
# This way file:../rymflux-shell resolves correctly.
#
# The shell needs its types built (pnpm package) before the audiobook's
# svelte-check can resolve @rymflux/shell type declarations.
#
# Total wall time target: under 3 minutes.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: svelte-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          path: rymflux-audiobook

      - name: 'Checkout rymflux-shell (sibling for file: dep)'
        uses: actions/checkout@v4
        with:
          repository: rymflux/rymflux-shell
          path: rymflux-shell
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'rymflux-audiobook/pnpm-lock.yaml'

      # Build shell types first so @rymflux/shell declarations are available
      - name: Install shell dependencies
        working-directory: rymflux-shell
        run: pnpm install --frozen-lockfile

      - name: Build shell types
        working-directory: rymflux-shell
        run: pnpm prepack

      - name: Install dependencies
        working-directory: rymflux-audiobook
        run: pnpm install --frozen-lockfile

      - name: Type check (svelte-check)
        working-directory: rymflux-audiobook
        run: pnpm check

  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          path: rymflux-audiobook

      - name: 'Checkout rymflux-shell (sibling for file: dep)'
        uses: actions/checkout@v4
        with:
          repository: rymflux/rymflux-shell
          path: rymflux-shell
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'rymflux-audiobook/pnpm-lock.yaml'

      - name: Install dependencies
        working-directory: rymflux-audiobook
        run: pnpm install --frozen-lockfile

      - name: Style & lint check
        working-directory: rymflux-audiobook
        run: pnpm lint

  test:
    name: vitest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          path: rymflux-audiobook

      - name: 'Checkout rymflux-shell (sibling for file: dep)'
        uses: actions/checkout@v4
        with:
          repository: rymflux/rymflux-shell
          path: rymflux-shell
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'rymflux-audiobook/pnpm-lock.yaml'

      - name: Install dependencies
        working-directory: rymflux-audiobook
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: rymflux-audiobook
        run: pnpm exec playwright install chromium

      - name: Run unit tests
        working-directory: rymflux-audiobook
        run: pnpm test
