# CI for rymflux-audiobook
#
# Runs on push/PR to main. Three parallel jobs:
#   check — svelte-check (type safety gate)
#   lint  — prettier + eslint (style + code quality gate)
#   test  — vitest run (unit test gate)
#
# rymflux-audiobook depends on rymflux-shell via file:../rymflux-shell,
# so the shell repo is checked out as a sibling directory.
# The main repo uses the default checkout (no path:) so that
# file:../rymflux-shell resolves correctly from the workspace root.
#
# Total wall time target: under 3 minutes.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: svelte-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: 'Checkout rymflux-shell (sibling for file: dep)'
        uses: actions/checkout@v4
        with:
          repository: rymflux/rymflux-shell
          path: rymflux-shell
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check (svelte-check)
        run: pnpm check

  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: 'Checkout rymflux-shell (sibling for file: dep)'
        uses: actions/checkout@v4
        with:
          repository: rymflux/rymflux-shell
          path: rymflux-shell
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Style & lint check
        run: pnpm lint

  test:
    name: vitest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: 'Checkout rymflux-shell (sibling for file: dep)'
        uses: actions/checkout@v4
        with:
          repository: rymflux/rymflux-shell
          path: rymflux-shell
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium

      - name: Run unit tests
        run: pnpm test
